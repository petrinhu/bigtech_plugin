name: ci

# CI do plugin "bigtech" no Codeberg (Forgejo Actions).
# Roda os mesmos 8 gates do pre-CI local (scripts/preci.sh): (1) zero-orfaos
# (spec 4.1), (2) pytest (suite dos hooks), (3) JSON valido (3 manifestos), (4) paridade
# de versao (plugin.json == marketplace.json), (5) ruff, (6) gitleaks, (7) smoke
# offline (frontmatter parseavel + hooks executam) e (8) claude plugin validate
# --strict (x2: diretorio + plugin.json; degrada gracioso se a CLI nao estiver no
# runner). Os gates 5/6/8 degradam gracioso quando a ferramenta esta ausente.
#
# Regras de runner (ver memoria codeberg-runners):
#   - runs-on: codeberg-medium (4 CPU, 8 GB, 10 min; runner GLOBAL da Codeberg).
#     Tiers validos (codeberg.org/actions/meta): codeberg-tiny (1/2/2min), codeberg-small
#     (2/4/5min), codeberg-medium (4/8/10min); cada um tem variante "-lazy" (mais
#     disponivel, porem janela de ate 24h). NUNCA "runs-on: docker": mapeia pro runner
#     individual "claudio", offline (confirmado 2026-06). Em fila/saturacao do medium,
#     alternar pra "codeberg-medium-lazy". Evitar codeberg-small: 5 min e apertado pros
#     gates (run de referencia levou 3m3s no medium).
#   - container: ghcr.io/catthehacker/ubuntu:act-latest (default oficial; compat
#     com actions/setup-python — node:*-bookworm QUEBRA setup-python).
#   - actions pinadas major (@v4 / @v5).
#   - SEM "permissions:" (Forgejo ignora). Concorrencia via "concurrency:".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela run em andamento da mesma ref quando chega push novo — poupa fila.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (preci)
    # codeberg-medium-lazy (global): gates Python puro + binario leve, nada compila.
    # Trocado para -lazy em 2026-06-13: o standard codeberg-medium ficou >15 min em
    # waiting sem pegar runner (fila congestionada). O pool lazy (carga flexivel,
    # infra offsite, janela ate 24h) costuma pegar quando o standard satura. Voltar
    # pro codeberg-medium quando a fila normalizar.
    runs-on: codeberg-medium-lazy
    container:
      # act-latest = default Codeberg, compat GitHub Actions + setup-python.
      image: ghcr.io/catthehacker/ubuntu:act-latest
    env:
      # Versao pinada do gitleaks (binario de release — NAO compilar
      # from-source, estoura timeout). Bump manual quando quiser atualizar.
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling (pytest + ruff)
        run: |
          python -m pip install --upgrade pip
          # pytest e ruff sao wheels puros/leves — install rapido, nada compila.
          pip install pytest ruff

      - name: Install gitleaks (binario de release)
        run: |
          set -euo pipefail
          ver="${GITLEAKS_VERSION}"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz"
          echo "Baixando gitleaks v${ver}..."
          curl --proto '=https' --tlsv1.2 -fsSL "$url" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run pre-CI gates (scripts/preci.sh)
        run: bash scripts/preci.sh
